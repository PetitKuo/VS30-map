<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VS30 & Z1.0 定位查詢</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <style>
        body, html { height: 100%; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #map { height: 100%; width: 100%; }
        #info-panel {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: white; padding: 15px 20px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center;
            z-index: 1000; width: 80%; max-width: 280px;
        }
        .val { font-size: 22px; font-weight: bold; color: #d32f2f; margin: 4px 0; }
        .dist { font-size: 13px; color: #777; margin-top: 8px; border-top: 1px solid #eee; padding-top: 6px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="info-panel">
        <div style="font-size: 14px; color: #444;">目前位置數值</div>
        <div id="vs30-display" class="val">讀取中...</div>
        <div id="z10-display" class="val"></div>
        <div id="distance-display" class="dist"></div>
    </div>

    <script>
        let map, userMarker, vs30Data;

        function initMap() {
            map = L.map('map').setView([24.96, 121.22], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            startTracking();

            // 請確保檔案名稱與 GitHub 上完全一致（大小寫需相同）
            fetch('Vs30_Z10_EG_SSHAC_integrate_grid2km.geojson')
                .then(res => {
                    if (!res.ok) throw new Error("找不到檔案");
                    return res.json();
                })
                .then(data => { 
                    vs30Data = data; 
                    console.log("資料加載完成");
                })
                .catch(err => {
                    document.getElementById("vs30-display").innerText = "資料加載失敗";
                });
        }

        function startTracking() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    const { latitude: lat, longitude: lng } = pos.coords;
                    if (!userMarker) {
                        userMarker = L.circleMarker([lat, lng], { radius: 8, fillColor: "#4285F4", color: "#fff", weight: 2, fillOpacity: 1 }).addTo(map);
                        map.setView([lat, lng], 15);
                    } else {
                        userMarker.setLatLng([lat, lng]);
                    }
                    calculateValues(lng, lat);
                }, () => {
                    document.getElementById("vs30-display").innerText = "請開啟定位權限";
                }, { enableHighAccuracy: true });
            }
        }

        function calculateValues(lng, lat) {
            if (!vs30Data) return;

            const userPoint = turf.point([lng, lat]);
            // 修正處：確保 nearestFeature 定義在邏輯塊內
            const nearestFeature = turf.nearestPoint(userPoint, vs30Data);

            if (nearestFeature && nearestFeature.properties) {
                const vs = nearestFeature.properties.Vs30;
                const z1 = nearestFeature.properties.Z10;
                const dist = turf.distance(userPoint, nearestFeature, {units: 'kilometers'});

                if (dist > 1.5 || vs === -999) {
                    document.getElementById("vs30-display").innerText = "此區域無資料";
                    document.getElementById("z10-display").innerText = "";
                    document.getElementById("distance-display").innerText = "";
                } else {
                    // 以整數表示
                    document.getElementById("vs30-display").innerText = "Vs30: " + Math.round(vs) + " m/s";
                    document.getElementById("z10-display").innerText = "Z1.0: " + Math.round(z1) + " m";
                    document.getElementById("distance-display").innerText = "距格點中心 " + Math.round(dist * 1000) + " 公尺";
                }
            }
        }
        window.onload = initMap;
    </script>
</body>
</html>
